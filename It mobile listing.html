<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Intel+One+Mono:ital,wght@0,300;0,400;0,700&display=swap" rel="stylesheet" />
<style>
/* ─────────────────────────────────────────
   RESET  (8-point grid: 1u = 8px)
   ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font:       'Intel One Mono', monospace;
  --gold:       #C9A227;
  --gold-mid:   rgba(201,162,39,.55);
  --gold-outer: rgba(201,162,39,.18);
  --pad:        88px;   /* 11 × 8 */
}

html, body {
  width: 100%;
  min-height: 100vh;
  font-family: var(--font);
  background: #fff;
  color: #000;
}

/* NAVIGATION */
/* Container */
.wrapper{
    padding-left:80px;
    padding-top:40px;
}

nav{
    padding:24px 40px 0;
}

nav a{
    text-decoration:none;
    color:#000;
    font-size:14px;
    padding:8px 12px;
    border-radius:8px;
    transition:all .3s ease;
    margin-right:8px;
}

nav a:hover{
    color:#c9940a;
    background:rgba(201,148,10,.08);
    box-shadow:
        0 0 5px rgba(201,148,10,.20),
        0 0 10px rgba(201,148,10,.10);
    transform:translateY(-1px);
}


/* ─────────────────────────────────────────
   NAV — top-left
   ───────────────────────────────────────── 
.nav {
  height: 64px;                 /* 8 × 8 */
  padding: 0 var(--pad);
  display: flex;
  align-items: center;
  justify-content: flex-start;  /* LEFT */
  gap: 48px;                    /* 6 × 8 */
}*/

.nav a {
  font-size: 12px;
  font-weight: 400;
  line-height: 1.5;
  color: #000;
  text-decoration: none;
  transition: opacity .2s;
}


/* ─────────────────────────────────────────
   HERO
   ───────────────────────────────────────── */
.hero {
  padding: 48px var(--pad) 32px;  /* 6×8 top, 4×8 bottom */
}
.hero-title,
.hero-sub,
.hero-label {
  display: inline-block;
  transform: rotate(-.63deg);
  transform-origin: left center;
  line-height: 1.5;
  font-weight: 700;
}
.hero-title { font-size: 32px; display: block; }
.hero-sub   { font-size: 32px; display: block; margin-top: 8px; }
.hero-label { font-size: 24px; display: block; margin-top: 8px; }

/* ─────────────────────────────────────────
   CARDS SECTION
   ───────────────────────────────────────── */
.cards-section {
  padding: 0 var(--pad) 80px;
  margin-top: 32px;
}
.cards-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 32px;          /* 4 × 8 */
}

/* ─────────────────────────────────────────
   SINGLE CARD
   ───────────────────────────────────────── */
.card {
  width: 296px;
  position: relative;
  cursor: pointer;
  border-radius: 4px;
  overflow: visible;  /* image pops above card bounds */
  transition: box-shadow .35s ease;
  outline: none;
}

/* royal gold glow */
.card:hover,
.card:focus-visible {
  box-shadow:
    0 0 0 1px var(--gold),
    0 0 20px 4px var(--gold-mid),
    0 0 56px 16px var(--gold-outer);
}

/* image wrapper */
.card-img {
  width: 100%;
  height: 184px;      /* 23 × 8 */
  overflow: hidden;
  border-radius: 4px 4px 0 0;
  background: #e5e5e5;
  position: relative;
  z-index: 2;
  transition:
    transform .42s cubic-bezier(.34,1.56,.64,1),
    box-shadow .35s ease;
}

/* image pops 16px (2 × 8) upward */
.card:hover .card-img,
.card:focus-visible .card-img {
  transform: translateY(-16px);
  box-shadow: 0 14px 36px rgba(0,0,0,.22);
}

.card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
  user-select: none;
}

/* placeholder when no image */
.card-img .placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg,#ebebeb,#d5d5d5);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #aaa;
  font-size: 10px;
  letter-spacing: .07em;
  text-transform: uppercase;
}
.card-img .placeholder svg {
  width: 34px; height: 34px;
  stroke: #bbb; stroke-width: 1.4px;
  fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}

/* frosted glass body */
.card-body {
  background: rgba(217,217,217,.20);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid rgba(255,255,255,.55);
  padding: 16px;        /* 2 × 8 */
  min-height: 96px;     /* 12 × 8 */
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 1;
  border-radius: 0 0 4px 4px;
  transition: background .35s ease;
}
.card:hover .card-body,
.card:focus-visible .card-body {
  background: rgba(201,162,39,.07);
}

.card-title { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 4px; }
.card-meta  { font-size: 11px; font-weight: 400; color: #555; line-height: 1.5; }

/* "View" badge */
.card-hint {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(201,162,39,.12);
  border: 1px solid var(--gold);
  border-radius: 2px;
  font-size: 9px;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--gold);
  padding: 2px 6px;
  opacity: 0;
  transition: opacity .25s;
  pointer-events: none;
  z-index: 3;
}
.card:hover .card-hint,
.card:focus-visible .card-hint { opacity: 1; }

/* ─────────────────────────────────────────
   FOOTER
   ───────────────────────────────────────── */
.footer {
  padding: 0 var(--pad) 24px;
}
.footer span {
  display: inline-block;
  font-size: 16px;
  font-weight: 300;
  line-height: 1.5;
  transform: rotate(-.63deg);
  transform-origin: left center;
}

/* ─────────────────────────────────────────
   LIGHTBOX
   ───────────────────────────────────────── */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  transition: background .3s ease;
}
.lightbox.active {
  background: rgba(0,0,0,.88);
  pointer-events: all;
}
.lb-inner {
  position: relative;
  max-width: 90vw;
  max-height: 90vh;
  opacity: 0;
  transform: scale(.88);
  transition:
    opacity .35s ease,
    transform .38s cubic-bezier(.34,1.4,.64,1);
}
.lightbox.active .lb-inner {
  opacity: 1;
  transform: scale(1);
}
.lb-img {
  max-width: 90vw;
  max-height: 82vh;
  object-fit: contain;
  border-radius: 8px;
  display: block;
  box-shadow:
    0 0 0 1px var(--gold),
    0 0 40px 8px var(--gold-mid),
    0 32px 80px rgba(0,0,0,.6);
}
.lb-caption {
  text-align: center;
  color: #888;
  font-size: 11px;
  letter-spacing: .06em;
  margin-top: 16px;
}
/* placeholder state */
.lb-empty {
  width: min(560px,88vw);
  height: min(360px,68vh);
  background: linear-gradient(135deg,#181818,#242424);
  border-radius: 8px;
  border: 1px solid var(--gold);
  box-shadow: 0 0 40px 10px var(--gold-mid);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 11px;
  letter-spacing: .06em;
  text-align: center;
  padding: 40px;
  color: #555;
}
.lb-empty svg {
  width: 48px; height: 48px;
  stroke: #444; stroke-width: 1.2px;
  fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  margin-bottom: 8px;
}
.lb-empty strong { color: #aaa; font-size: 13px; font-weight: 700; }

/* close button */
.lb-close {
  position: fixed;
  top: 24px; right: 32px;
  background: none;
  border: none;
  font-size: 36px;
  font-weight: 300;
  font-family: var(--font);
  color: #fff;
  cursor: pointer;
  line-height: 1;
  padding: 8px;
  transition: color .2s, transform .25s;
}
.lb-close:hover {
  color: var(--gold);
  transform: rotate(90deg) scale(1.15);
}





.lb-inner{
  position:relative;
  max-width:90vw;
  max-height:90vh;
}

.lb-image-wrap{
  max-width:90vw;
  max-height:82vh;
  overflow:auto;
  cursor:grab;
}

.lb-image-wrap:active{
  cursor:grabbing;
}

.lb-controls{
  position:absolute;
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:12px;
  z-index:10000;
}

.lb-btn{
  width:44px;
  height:44px;
  border:none;
  border-radius:6px;
  background:rgba(0,0,0,.8);
  color:#fff;
  font-size:20px;
  cursor:pointer;
}

.lb-img{
  display:block;
  max-width:none;
  max-height:none;
  transition:transform .2s ease;
  transform-origin:top left;
}

/* zoom controls */
.lb-controls{
  position:absolute;
  top:16px;
  left:16px;
  display:flex;
  gap:8px;
  z-index:10;
}

.lb-btn{
  width:40px;
  height:40px;
  border:1px solid var(--gold);
  background:rgba(0,0,0,.7);
  color:#fff;
  cursor:pointer;
  border-radius:4px;
  font-size:20px;
  transition:.2s;
}

.lb-btn:hover{
  background:var(--gold);
  color:#000;
}

.lb-img{
  transition:transform .2s ease;
  transform-origin:center center;
}
/* ─── responsive ─── */
@media (max-width: 768px) {
  :root { --pad: 24px; }
  .cards-grid { gap: 24px; }
  .card { width: 100%; max-width: 296px; }
  
}
@media (max-width: 768px) {
  :root { --pad: 24px; }
  .cards-grid { gap: 24px; }
  .card { width: 100%; max-width: 296px; }

  .lb-controls {
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    right: auto;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
  <a href="index.html">Designs</a>
  <a href="Casestudies.html">Case Studies</a>
  
</nav>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">Designs</h1>
  <h2 class="hero-sub">Cravings.pk</h2>
  <h3 class="hero-label">Desktop Design</h3>
</section>

<!-- CARDS -->
<section class="cards-section">
  <div class="cards-grid" id="grid"></div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <span>Copyright@ by SalikAshraf 2026</span>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-inner" id="lbInner"></div>
  <button class="lb-close" id="lbClose">&#215;</button>
</div>

<script>
  // ── Card data ───────────────────────────────────────────────────
  // To add an image: set image to a URL string, e.g. 'images/shot1.jpg'
  var cards = [
    { title: 'SALTECH', meta: 'Mobile Design · 2026', image: 'im1.png' },
    { title: 'SALTECH', meta: 'Mobile Design · 2026',  image: 'im11.png' },
    { title: 'SALTECH', meta: 'Mobile Design · 2026',  image: 'im111.png' },
    { title: 'SALTECH', meta: 'Mobile Design · 2026',  image: 'im2.png' },
    { title: 'SALTECH', meta: 'Mobile Design · 2026',  image: 'im3.png' },
    { title: 'SALTECH', meta: 'Mobile Design · 2026',  image: 'im4.png' },
    
    
    
  ];

  // ── Build cards ─────────────────────────────────────────────────
  var grid = document.getElementById('grid');

  cards.forEach(function(card, i) {
    var el = document.createElement('div');
    el.className = 'card';
    el.tabIndex = 0;
    el.setAttribute('role', 'button');
    el.setAttribute('aria-label', 'View ' + card.title);

    var imgContent = card.image
      ? '<img src="' + card.image + '" alt="' + card.title + '" />'
      : '<div class="placeholder">' +
          '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/>' +
          '<circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
          '<span>Image placeholder</span>' +
        '</div>';

    el.innerHTML =
      '<span class="card-hint">View</span>' +
      '<div class="card-img">' + imgContent + '</div>' +
      '<div class="card-body">' +
        '<div class="card-title">' + card.title + '</div>' +
        '<div class="card-meta">'  + card.meta  + '</div>' +
      '</div>';

    el.addEventListener('click', function() { openLightbox(i); });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(i); }
    });

    grid.appendChild(el);
  });
// ── Lightbox ────────────────────────────────────────────────────
var lightbox = document.getElementById('lightbox');
var lbInner  = document.getElementById('lbInner');
var lbClose  = document.getElementById('lbClose');

var zoomLevel = 1;

function openLightbox(i) {
  var c = cards[i];

  if (c.image) {
    lbInner.innerHTML =
      '<div class="lb-controls">' +
        '<button class="lb-btn" id="zoomOut">−</button>' +
        '<button class="lb-btn" id="zoomReset">↺</button>' +
        '<button class="lb-btn" id="zoomIn">+</button>' +
      '</div>' +

      '<div class="lb-image-wrap" id="imageWrap">' +
        '<img class="lb-img" id="lightboxImage" src="' + c.image + '" alt="' + c.title + '" />' +
      '</div>' +

      '<p class="lb-caption">' + c.title + ' — ' + c.meta + '</p>';

    zoomLevel = 1;

    var img = document.getElementById('lightboxImage');
    var wrap = document.getElementById('imageWrap');

    function updateZoom() {
      img.style.transform = 'scale(' + zoomLevel + ')';
    }

    document.getElementById('zoomIn').addEventListener('click', function(e) {
      e.stopPropagation();
      zoomLevel += 0.25;
      updateZoom();
    });

    document.getElementById('zoomOut').addEventListener('click', function(e) {
      e.stopPropagation();
      zoomLevel = Math.max(0.5, zoomLevel - 0.25);
      updateZoom();
    });

    document.getElementById('zoomReset').addEventListener('click', function(e) {
      e.stopPropagation();
      zoomLevel = 1;
      wrap.scrollTop = 0;
      wrap.scrollLeft = 0;
      updateZoom();
    });

    

   // Drag to Pan (works anywhere on image)

let isDragging = false;
let startX = 0;
let startY = 0;
let scrollLeft = 0;
let scrollTop = 0;

img.addEventListener("mousedown", function (e) {

    e.preventDefault();

    isDragging = true;

    startX = e.clientX;
    startY = e.clientY;

    scrollLeft = wrap.scrollLeft;
    scrollTop = wrap.scrollTop;

    wrap.style.cursor = "grabbing";
});

window.addEventListener("mouseup", function () {

    isDragging = false;
    wrap.style.cursor = "grab";

});

window.addEventListener("mousemove", function (e) {

    if (!isDragging) return;

    e.preventDefault();

    wrap.scrollLeft = scrollLeft - (e.clientX - startX);
    wrap.scrollTop = scrollTop - (e.clientY - startY);

});
  } else {
    lbInner.innerHTML =
      '<div class="lb-empty">' +
        '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/>' +
        '<circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>' +
        '<strong>' + c.title + '</strong>' +
        '<span>' + c.meta + '</span>' +
        '<span style="color:#333;margin-top:4px;">Set an image URL in the cards array to display it here.</span>' +
      '</div>';
  }

  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
}

lbClose.addEventListener('click', closeLightbox);

lightbox.addEventListener('click', function(e) {
  if (e.target === lightbox) closeLightbox();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});
</script>
</body>
</html>
