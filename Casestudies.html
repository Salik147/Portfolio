/* NAVIGATION */
/* Container */
.wrapper{
    padding-left:80px;
    padding-top:40px;
}

nav{
    padding:24px 40px 0;
}

nav a{
    text-decoration:none;
    color:#000;
    font-size:14px;
    padding:8px 12px;
    border-radius:8px;
    transition:all .3s ease;
    margin-right:8px;
}

nav a:hover{
    color:#c9940a;
    background:rgba(201,148,10,.08);
    box-shadow:
        0 0 5px rgba(201,148,10,.20),
        0 0 10px rgba(201,148,10,.10);
    transform:translateY(-1px);
}

/* COMING SOON */

.coming-soon h1{
  font-size:72px;
  margin-bottom:16px;
  color:#d4af37;
  text-transform:uppercase;
  letter-spacing:5px;
  animation:royalGoldGlow 3s infinite alternate;
}

@keyframes royalGoldGlow{
  0%{
    text-shadow:
      0 0 8px #c9940a,
      0 0 16px #c9940a,
      0 0 24px rgba(201,148,10,.5);
  }

  50%{
    text-shadow:
      0 0 12px #d4af37,
      0 0 24px #d4af37,
      0 0 48px rgba(212,175,55,.8);
  }

  100%{
    text-shadow:
      0 0 18px #f4d03f,
      0 0 36px #f4d03f,
      0 0 72px rgba(244,208,63,.9);
  }
}

.coming-soon{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
}

.coming-soon h1{
  font-size:72px;
  margin-bottom:16px;
}

.coming-soon p{
  font-size:18px;
  color:#666;
}

.coming-soon h1{
  font-size:72px;
  margin-bottom:16px;
  color:#d4af37;
  text-transform:uppercase;
  letter-spacing:6px;
  font-weight:600;

  text-shadow:
    0 0 5px #d4af37,
    0 0 10px #d4af37,
    0 0 20px #d4af37,
    0 0 40px rgba(212,175,55,.8);

  animation:flickerGold 4s infinite;
}

@keyframes flickerGold{

  0%,18%,22%,25%,53%,57%,100%{
    opacity:1;
    text-shadow:
      0 0 5px #d4af37,
      0 0 10px #d4af37,
      0 0 20px #d4af37,
      0 0 40px rgba(212,175,55,.9),
      0 0 80px rgba(212,175,55,.6);
  }

  20%,24%,55%{
    opacity:.75;
    text-shadow:
      0 0 3px #d4af37,
      0 0 6px #d4af37,
      0 0 12px rgba(212,175,55,.5);
  }

  21%,56%{
    opacity:.35;
    text-shadow:none;
  }
}
