
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salik Ashraf Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f8f8f6;
  --card:#0d0d14;
  --gold:#c9940a;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* COMING SOON */

.coming-soon h1{
  font-size:72px;
  margin-bottom:16px;
  color:#d4af37;
  text-transform:uppercase;
  letter-spacing:5px;
  animation:royalGoldGlow 3s infinite alternate;
}

@keyframes royalGoldGlow{
  0%{
    text-shadow:
      0 0 8px #c9940a,
      0 0 16px #c9940a,
      0 0 24px rgba(201,148,10,.5);
  }

  50%{
    text-shadow:
      0 0 12px #d4af37,
      0 0 24px #d4af37,
      0 0 48px rgba(212,175,55,.8);
  }

  100%{
    text-shadow:
      0 0 18px #f4d03f,
      0 0 36px #f4d03f,
      0 0 72px rgba(244,208,63,.9);
  }
}

.coming-soon{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
}

.coming-soon h1{
  font-size:72px;
  margin-bottom:16px;
}

.coming-soon p{
  font-size:18px;
  color:#666;
}

.coming-soon h1{
  font-size:72px;
  margin-bottom:16px;
  color:#d4af37;
  text-transform:uppercase;
  letter-spacing:6px;
  font-weight:600;

  text-shadow:
    0 0 5px #d4af37,
    0 0 10px #d4af37,
    0 0 20px #d4af37,
    0 0 40px rgba(212,175,55,.8);

  animation:flickerGold 4s infinite;
}

@keyframes flickerGold{

  0%,18%,22%,25%,53%,57%,100%{
    opacity:1;
    text-shadow:
      0 0 5px #d4af37,
      0 0 10px #d4af37,
      0 0 20px #d4af37,
      0 0 40px rgba(212,175,55,.9),
      0 0 80px rgba(212,175,55,.6);
  }

  20%,24%,55%{
    opacity:.75;
    text-shadow:
      0 0 3px #d4af37,
      0 0 6px #d4af37,
      0 0 12px rgba(212,175,55,.5);
  }

  21%,56%{
    opacity:.35;
    text-shadow:none;
  }
}


body{
    min-height:100vh;
}

body{
    background:var(--bg);
    font-family:'IBM Plex Mono', monospace;
    color:#000;
    display:flex;
    flex-direction:column;
}

/* NAV */

nav a{
  text-decoration:none;
  color:#000000;
  font-size:14px;
  padding:8px 12px;
  border-radius:8px;
  transition:all .3s ease;
}

nav a:hover{
  color:#c9940a;
  background:rgba(201,148,10,.08);
  box-shadow:
    0 0 5px rgba(201,148,10,.20),
    0 0 10px rgba(201,148,10,.10);
  transform:translateY(-1px);
}


/* HERO */

.hero{
  padding:24px 40px 96px;
  max-width:768px;
}

.hero h1{
  font-size:48px;
  line-height:56px; /* multiple of 8 */
  margin-bottom:24px;
}

.hero p{
  line-height:32px; /* 4 × 8 */
  max-width:600px;
}

/* DESIGNS */

.designs{
  padding:0 40px 96px;
}

.designs-title{
  font-size:32px;
  line-height:40px;
  margin-bottom:64px;
}
.project{
  margin-bottom:96px;
}

.project h2{
  font-size:24px;
  line-height:32px;
  margin-bottom:16px;
}

.project p{
  margin-bottom:40px;
  line-height:24px;
}

.project{
  margin-bottom:96px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}

/* CARD */

.card{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:var(--card);
  aspect-ratio:16/10;
  cursor:pointer;
  box-shadow:0 4px 24px rgba(0,0,0,.4);
  transition:.3s ease;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:
    0 0 0 2px var(--gold),
    0 0 32px 6px rgba(201,148,10,.45),
    0 16px 40px rgba(0,0,0,.5);
}

.card-image{
  width:100%;
  height:100%;
  transition:transform .3s ease;
}

.card:hover .card-image{
  transform:scale(1.05);
}

.placeholder{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.placeholder::before{
  content:"";
  position:absolute;
  inset:0;
  opacity:.04;
  background-image:
      repeating-linear-gradient(
        0deg,
        #fff 0,
        #fff 1px,
        transparent 1px,
        transparent 40px),
      repeating-linear-gradient(
        90deg,
        #fff 0,
        #fff 1px,
        transparent 1px,
        transparent 40px);
}

.placeholder span{
  position:relative;
  text-transform:uppercase;
  font-size:10px;
  letter-spacing:.2em;
  color:#52525b;
  text-align:center;
}

.card-footer{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
  backdrop-filter:blur(16px);
  background:rgba(13,13,20,.55);
  border-top:1px solid rgba(255,255,255,.08);
}

.card-footer p{
  color:rgba(255,255,255,.7);
  margin:0;
  font-size:12px;
}

.dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--gold);
}

/* LIGHTBOX */

.lightbox{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.9);
  padding:32px;
  z-index:999;
}

.lightbox.active{
  display:flex;
}

.lightbox-content{
  max-width:1100px;
  width:100%;
}

.lightbox img{
  width:100%;
  max-height:80vh;
  object-fit:contain;
  border-radius:12px;
}

.lightbox-close{
  position:absolute;
  top:32px;
  right:32px;
  font-size:42px;
  color:white;
  cursor:pointer;
}

.lightbox-close:hover{
  color:var(--gold);
}

.lightbox-label{
  color:#a1a1aa;
  text-align:center;
  margin-top:16px;
  font-size:14px;
}

/* FOOTER */

footer{
  border-top:1px solid rgba(0,0,0,.1);
  padding:32px 40px;
}

footer p{
  font-size:12px;
  color:#a1a1aa;
}

body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    padding: 40px;
}

.devices {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
    align-items: flex-end;
}

/* Common Device Style */
.device {
    position: relative;
    background: #222;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

.screen {
    overflow: hidden;
    background: #fff;
}

.screen img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* Laptop */
.laptop {
    width: 500px;
    height: 310px;
    padding: 15px;
}

.laptop .screen {
    width: 100%;
    height: 100%;
    border-radius: 10px;
}

.laptop::after {
    content: "";
    position: absolute;
    bottom: -18px;
    left: -20px;
    width: calc(100% + 40px);
    height: 18px;
    background: #bdbdbd;
    border-radius: 0 0 20px 20px;
}

/* Tablet */
.tablet {
    width: 250px;
    height: 340px;
    padding: 12px;
    border-radius: 25px;
}

.tablet .screen {
    width: 100%;
    height: 100%;
    border-radius: 15px;
}

/* Phone */
.phone {
    width: 180px;
    height: 360px;
    padding: 10px;
    border-radius: 30px;
}

.phone .screen {
    width: 100%;
    height: 100%;
    border-radius: 20px;
}

.phone::before {
    content: "";
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 8px;
    background: #444;
    border-radius: 10px;
}

/* Responsive */
@media (max-width: 900px) {
    .devices {
        flex-direction: column;
        align-items: center;
    }

    .laptop {
        width: 90%;
        max-width: 500px;
        height: auto;
        aspect-ratio: 16/10;
    }
}

/* glow */

.device {
    transition: transform 0.3s ease, filter 0.3s ease;
}

.device:hover {
    transform: translateY(-4px);
    filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.35))
            drop-shadow(0 0 12px rgba(255, 215, 0, 0.2));
}

.device:hover .screen {
    border: 1px solid rgba(255, 215, 0, 0.7);
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}
</style>
</head>

</body>
</html>
